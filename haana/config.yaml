name: "HAANA"
description: "AI Household Assistant with persistent memory"
version: "0.1.10"
slug: "haana"
url: "https://github.com/bennizone/haana-dev"
arch:
  - amd64
  - aarch64
init: false
homeassistant_api: true
hassio_role: admin
auth_api: true
ingress: true
ingress_port: 8080
panel_icon: "mdi:robot"
panel_title: "HAANA"
map:
  - data:rw
  - media:rw
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "HAANA Admin Interface"
options:
  anthropic_api_key: ""
schema:
  anthropic_api_key: "str?"
  ollama_url: "url?"
  ha_mcp_url: "url?"
startup: "application"
boot: "auto"
